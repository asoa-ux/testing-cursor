    function renderGalleryView() {
      const gallery = document.getElementById('galleryGrid');
      const items = getFilteredProducts();
      gallery.innerHTML = `
        <div class="gallery-grid">
          ${items.map((p, i) => {
            const isCategory = Array.isArray(p.children);
            const hasSubcategories = isCategory && p.children.length > 0;
            const isActive = state.activeItemId === p.id;
            return `
            <div class="gallery-card ${state.checkedItems.includes(i) ? 'checked' : ''} ${isActive ? 'active' : ''}" 
                 onclick="setActiveItem('${p.id}')">
              <div class="gallery-card-checkbox">
                <div class="checkbox ${state.checkedItems.includes(i) ? 'checked' : ''}" onclick="toggleCheckbox(${i}, event)"></div>
              </div>
              ${isCategory ? `<div style="position:absolute;top:8px;right:8px;background:var(--text-muted);color:white;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;">${hasSubcategories ? p.children.length + ' sub' : getCategoryCount(p) + ' items'}</div>` : ''}
              <div class="gallery-card-image">
                ${p.image ? `<img src="${p.image}" alt="${p.name}">` : (isCategory ? icons.folder : icons.image)}
              </div>
              <div class="gallery-card-body">
                <div class="gallery-card-title">${p.name}</div>
                <div class="gallery-card-subtitle">${p.sku}</div>
                <div class="gallery-card-meta">
                  <span class="status-badge ${p.status}">${p.status}</span>
                  ${isCategory ? '' : `<span>$${p.price.toFixed(2)}</span>`}
                </div>
              </div>
            </div>
          `}).join('')}
        </div>
      `;
      
      document.getElementById('galleryFooter').innerHTML = `
        <span>${items.length} items</span>
      `;
    }

    function renderDetailView() {
      renderItemList();
      renderDetailMain();
      renderDetailSidebar();
    }

    function renderItemList() {
      const list = document.getElementById('itemList');
      const items = getDisplayedItems();
      
      // Determine which item is selected
      let selectedIndex = state.selectedItemIndex;
      if (state.viewingCategoryAsProduct && state.viewedCategoryId) {
        selectedIndex = items.findIndex(item => item.id === state.viewedCategoryId);
      }
      
      list.innerHTML = `
        <div class="item-list-content">
          ${items.map((p, i) => {
            const isCategory = Array.isArray(p.children);
            const isActive = selectedIndex === i;
            return `
            <div class="item-card ${isActive ? 'active' : ''}" onclick="selectItem(${i})">
              <div class="item-card-thumb">
                ${p.image ? `<img src="${p.image}" alt="">` : (isCategory ? icons.folder : icons.image)}
              </div>
              <div class="item-card-info">
                <div class="item-card-title">${p.name}</div>
                <div class="item-card-subtitle">${p.sku}${isCategory ? ` • ${getCategoryCount(p)} items` : ''}</div>
              </div>
            </div>
          `}).join('')}
        </div>
        <div class="item-list-footer">
          <span>${items.length} items</span>
        </div>
        <button class="panel-collapse-btn left" onclick="togglePanel('itemList')" title="Collapse panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div class="panel-collapsed-bar">
          <button class="expand-btn" onclick="togglePanel('itemList')" title="Expand Item List">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <span class="panel-label">Items</span>
        </div>
      `;
    }

    function getCurrentProduct() {
      // Return either a category (parent product) or a regular product
      if (state.viewingCategoryAsProduct) {
        // Use viewedCategoryId if set, otherwise fall back to selectedCategoryId
        const categoryId = state.viewedCategoryId || state.selectedCategoryId;
        if (categoryId) {
          return findCategoryById(categoryId);
        }
      }
      const items = getDisplayedItems();
      return items[state.selectedItemIndex];
    }

    function renderDetailMain() {
      const main = document.getElementById('detailMain');
      const p = getCurrentProduct();
      if (!p) return;

      main.innerHTML = `
        <div class="detail-header">
          <div class="detail-header-content">
            <div class="detail-title">
              ${p.name}
            </div>
            <div class="detail-subtitle">${p.id} • ${p.sku}</div>
          </div>
          <span class="status-badge ${p.status}">${p.status}</span>
        </div>
        <div class="detail-tabs">
          ${detailTabs.map(tab => `
            <div class="detail-tab ${state.activeDetailTab === tab.id ? 'active' : ''}" onclick="switchDetailTab('${tab.id}')">${tab.label}</div>
          `).join('')}
        </div>
        <div class="detail-content">
          ${renderDetailTabContent()}
        </div>
      `;
    }

    function renderDetailTabContent() {
      const p = getCurrentProduct();
      if (!p) return '';

      switch (state.activeDetailTab) {
        case 'basic':
          return renderBasicInfoTab(p);
        case 'relations':
          return renderRelationsTab(p);
        case 'assets':
          return renderAssetsTab(p);
        case 'pricing':
          return renderPricingTab(p);
        default:
          return '<div class="tab-form-scroll"><p class="text-muted">Tab content coming soon...</p></div>';
      }
    }

    function renderBasicInfoTab(p) {
      return `
        <div class="tab-form-scroll">
          <div class="form-section">
            <div class="form-section-title">Identifiers</div>
            ${renderFormField('Product ID', p.id, 'id', { readonly: true })}
            ${renderFormField('SKU', p.sku, 'sku')}
            ${renderFormField('Name', p.name, 'name', { required: true })}
          </div>
          <div class="form-section">
            <div class="form-section-title">Description</div>
            ${renderFormField('Short Description', '', 'shortDesc')}
            ${renderFormField('Long Description', '', 'longDesc', { type: 'textarea' })}
          </div>
          <div class="form-section">
            <div class="form-section-title">Classification</div>
            ${renderFormField('Category', p.category, 'category', { type: 'select' })}
            ${renderFormField('Brand', 'Gibson', 'brand')}
          </div>
        </div>
      `;
    }

    function renderFormField(label, value, field, options = {}) {
      const { type = 'text', required = false, readonly = false, inherited = false } = options;
      
      let inputHtml;
      if (type === 'textarea') {
        inputHtml = `<textarea class="form-textarea ${inherited ? 'inherited' : ''}" ${readonly ? 'readonly' : ''}>${value}</textarea>`;
      } else if (type === 'select') {
        inputHtml = `<select class="form-select ${inherited ? 'inherited' : ''}">${categories.flatMap(c => [c, ...(c.children || [])]).map(c => `<option ${c.name === value ? 'selected' : ''}>${c.name}</option>`).join('')}</select>`;
      } else {
        inputHtml = `<input type="text" class="form-input ${inherited ? 'inherited' : ''}" value="${value}" ${readonly ? 'readonly' : ''}>`;
      }

      return `
        <div class="form-field">
          <label class="form-label ${required ? 'required' : ''}">${label}</label>
          <div class="form-input-wrapper">
            ${inputHtml}
            <div class="field-actions">
              <button class="field-action-btn" title="AI Assist">${icons.ai}</button>
              <button class="field-action-btn" title="History">${icons.history}</button>
              <button class="field-action-btn" title="More">${icons.more}</button>
            </div>
            ${inherited ? '<div class="inherited-indicator"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg> Inherited from parent</div>' : ''}
          </div>
        </div>
      `;
    }

    function renderRelationsTab(p) {
      const allProductRelations = relations.filter(r => r.productId === p.id);
      const selectedType = state.selectedRelationType || 'all';
      let productRelations = selectedType === 'all' 
        ? allProductRelations 
        : allProductRelations.filter(r => r.type === selectedType);
      // Apply filters and sort
      productRelations = getFilteredRelations(productRelations);
      const checkedRelations = state.checkedRelations || [];
      
      // Get relation type counts
      const typeCounts = {
        all: allProductRelations.length,
        parent: allProductRelations.filter(r => r.type === 'parent').length,
        similar: allProductRelations.filter(r => r.type === 'similar').length,
        accessory: allProductRelations.filter(r => r.type === 'accessory').length,
        upsell: allProductRelations.filter(r => r.type === 'upsell').length,
        crosssell: allProductRelations.filter(r => r.type === 'crosssell').length,
      };

      const relationTypes = [
        { id: 'all', label: 'All Relations', icon: icons.folder },
        { id: 'parent', label: 'Parent', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>' },
        { id: 'similar', label: 'Similar', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>' },
        { id: 'accessory', label: 'Accessories', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>' },
        { id: 'upsell', label: 'Upsell', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' },
        { id: 'crosssell', label: 'Cross-sell', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>' },
      ];

      const tree = `
        <div style="width:200px;min-width:160px;border-right:1px solid var(--border);padding:12px;background:var(--bg-surface);">

          ${relationTypes.map(type => `
            <div class="tree-node">
              <div class="tree-node-content ${selectedType === type.id ? 'active' : ''}" onclick="selectRelationType('${type.id}')" style="padding:8px 10px;">
                <span class="tree-node-icon">${type.icon}</span>
                <span class="tree-node-label">${type.label}</span>
                ${typeCounts[type.id] > 0 ? `<span class="tree-node-count">${typeCounts[type.id]}</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      
      const toolbar = `
        <div style="display:flex;align-items:center;gap:8px;padding:12px;border-bottom:1px solid var(--border-light);background:var(--bg-surface);">
          <button class="toolbar-btn" onclick="showSortMenu('relations')">
            ${icons.sort}
            <span>Sort</span>
          </button>
          <button class="toolbar-btn ${state.relationFilters.length > 0 ? 'active' : ''}" onclick="showFilterPanel('relations')">
            ${icons.filter}
            <span>Filter${state.relationFilters.length > 0 ? ` (${state.relationFilters.length})` : ''}</span>
          </button>
          <button class="toolbar-btn primary" onclick="showToast('Add relation', 'info')">
            ${icons.plus}
            <span>Add</span>
          </button>
          <div class="toolbar-spacer"></div>
          <div class="toolbar-right">
            <span class="toolbar-info">${productRelations.length} of ${allProductRelations.length}</span>
            <div class="view-switcher">
              <button class="view-btn ${state.relationView === 'table' ? 'active' : ''}" onclick="switchRelationView('table')">
                ${icons.table}
                <span>Table</span>
              </button>
              <button class="view-btn ${state.relationView === 'gallery' ? 'active' : ''}" onclick="switchRelationView('gallery')">
                ${icons.gallery}
                <span>Gallery</span>
              </button>
              <button class="view-btn ${state.relationView === 'details' ? 'active' : ''}" onclick="switchRelationView('details')">
                ${icons.details}

      const selectionBar = checkedRelations.length > 0 ? `

          <div style="display:flex;gap:8px;">
            <button class="selection-btn" onclick="showToast('Edit relations', 'info')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

      let tableOrGallery;
      if (state.relationView === 'table') {
        tableOrGallery = `
          <div class="tab-content-scroll">

                  <th>Category</th>

                ${productRelations.length > 0 ? productRelations.map((r, i) => `

                      <button class="field-action-btn" onclick="event.stopPropagation(); viewRelatedProduct('${r.relatedId}')" title="Go to product">${icons.chevronRight}</button>

              </tbody>
            </table>
          </div>
        `;
      } else if (state.relationView === 'gallery') {
        tableOrGallery = `
          <div class="tab-content-scroll" style="padding:16px;">
            <div class="gallery-grid" style="grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));">
              ${productRelations.length > 0 ? productRelations.map((r, i) => `
                <div class="gallery-card ${checkedRelations.includes(i) ? 'selected' : ''} ${state.selectedRelationId === r.id ? 'active' : ''}" onclick="state.selectedRelationId='${r.id}'">
                  <div class="gallery-card-checkbox">
                    <div class="checkbox ${checkedRelations.includes(i) ? 'checked' : ''}" onclick="event.stopPropagation(); toggleRelationCheckbox(${i}, event)"></div>
                  </div>
                  <div class="gallery-card-image" style="height:100px;">
                    ${icons.image}
                  </div>
                  <div class="gallery-card-body">
                    <div class="gallery-card-title" style="font-size:12px;">${r.name}</div>
                    <div class="gallery-card-subtitle">${r.sku}</div>
                    <div class="gallery-card-meta">
                      <span class="status-badge ${r.type === 'parent' ? 'approved' : r.type === 'accessory' ? 'pending' : 'draft'}">${r.type}</span>
                    </div>
                  </div>
                  <div style="position:absolute;bottom:8px;right:8px;display:flex;gap:4px;">
                    <button class="field-action-btn" onclick="event.stopPropagation(); viewRelationDetails('${r.id}')" title="View details" style="background:var(--bg-surface);">${icons.details}</button>
                    <button class="field-action-btn" onclick="event.stopPropagation(); viewRelatedProduct('${r.relatedId}')" title="Go to product" style="background:var(--bg-surface);">${icons.chevronRight}</button>
                  </div>
                </div>
              `).join('') : `
                <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">No ${selectedType === 'all' ? '' : selectedType + ' '}relations found.</div>

        if (selectedRelation) {
          state.selectedRelationId = selectedRelation.id; // Ensure we have a selection
        }
        
        tableOrGallery = `
          <div style="display:flex;flex:1;overflow:hidden;">
            <div style="width:240px;min-width:200px;border-right:1px solid var(--border);overflow-y:auto;">

                  <div class="item-card-info">
                    <div class="item-card-title" style="font-size:12px;">${r.name}</div>

                <div style="padding:40px;text-align:center;color:var(--text-muted);">No relations</div>

            ${selectedRelation ? renderRelationDetailsPanel(selectedRelation) : `

      return `

            ${toolbar}
            ${tableOrGallery}

          ${state.relationView !== 'details' ? selectionBar : ''}

    }

          </button>

                          a.type === 'video' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:var(--text-muted);"><polygon points="5 3 19 12 5 21 5 3"/></svg>' :
                          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:var(--text-muted);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'}
                      </div>

      } else if (state.assetView === 'gallery') {

                  <div class="gallery-card-checkbox">
                    <div class="checkbox ${checkedAssets.includes(i) ? 'checked' : ''}" onclick="event.stopPropagation(); toggleAssetCheckbox(${i}, event)"></div>
                  </div>

                  <div class="gallery-card-image" style="height:120px;">
                    ${a.type === 'image' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:40px;height:40px;color:var(--text-muted);"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' : 
                      a.type === 'video' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:40px;height:40px;color:var(--text-muted);"><polygon points="5 3 19 12 5 21 5 3"/></svg>' :
                      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:40px;height:40px;color:var(--text-muted);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'}
                  </div>
                  <div class="gallery-card-body" style="padding:8px 10px;">
                    <div class="gallery-card-title" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.name}</div>
                    <div class="gallery-card-subtitle" style="font-size:10px;">${a.format} • ${a.size}</div>
                  </div>
                  <div style="position:absolute;bottom:8px;right:8px;display:flex;gap:4px;">
                    <button class="field-action-btn" onclick="event.stopPropagation(); viewAssetDetails('${a.id}')" title="View details" style="background:var(--bg-surface);">${icons.details}</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } else {
        // Details view - show list on left, details on right
        const selectedAsset = state.selectedAssetId ? assets.find(a => a.id === state.selectedAssetId) : filteredAssets[0];
        if (selectedAsset) {
          state.selectedAssetId = selectedAsset.id;
        }
        
        tableOrGallery = `
          <div style="display:flex;flex:1;overflow:hidden;">
            <div style="width:240px;min-width:200px;border-right:1px solid var(--border);overflow-y:auto;">
              ${filteredAssets.length > 0 ? filteredAssets.map((a, i) => `
                <div class="item-card ${state.selectedAssetId === a.id ? 'active' : ''}" onclick="state.selectedAssetId='${a.id}';renderDetailMain();" style="padding:10px 12px;">
                  <div class="item-card-thumb" style="width:40px;height:40px;">
                    ${a.type === 'image' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' : 
                      a.type === 'video' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><polygon points="5 3 19 12 5 21 5 3"/></svg>' :
                      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'}
                  </div>
                  <div class="item-card-info">
                    <div class="item-card-title" style="font-size:11px;">${a.name}</div>
                    <div class="item-card-subtitle" style="font-size:10px;">${a.format} • ${a.size}</div>
                  </div>
                </div>
              `).join('') : `
                <div style="padding:40px;text-align:center;color:var(--text-muted);">No assets</div>
              `}
            </div>
            ${selectedAsset ? renderAssetDetailsPanel(selectedAsset) : `
              <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);">
                <div style="text-align:center;">
                  ${icons.image}
                  <div style="margin-top:8px;">Select an asset to view details</div>
                </div>
              </div>
            `}
          </div>
        `;
      }

      const footer = state.assetView !== 'details' 
        ? `<div class="view-footer">${filteredAssets.length}${filteredAssets.length !== assets.length ? ' of ' + assets.length : ''} assets</div>`
        : '';

      return `
        <div class="tab-content-container">
          ${toolbar}
          ${tableOrGallery}
          ${footer}
          ${state.assetView !== 'details' ? selectionBar : ''}
        </div>
      `;
    }

    function renderPricingTab(p) {
      return `
        <div class="tab-form-scroll">
          <div class="form-section">
            <div class="form-section-title">Pricing</div>
            ${renderFormField('Base Price', '$' + p.price.toFixed(2), 'price')}
            ${renderFormField('Cost', '$0.00', 'cost')}
            ${renderFormField('MSRP', '$0.00', 'msrp')}
          </div>
        </div>
      `;
    }

    function renderDetailSidebar() {
      const sidebar = document.getElementById('detailSidebar');
      const p = getCurrentProduct();
      if (!p) return;

      sidebar.innerHTML = `
        <button class="panel-collapse-btn right" onclick="togglePanel('detailSidebar')" title="Collapse panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${state.detailSidebarCollapsed ? 'M15 19l-7-7 7-7' : 'M9 5l7 7-7 7'}"/></svg>
        </button>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Completeness</div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
            <div class="progress-bar" style="flex:1;">
              <div class="progress-fill ${p.completeness >= 80 ? 'success' : p.completeness >= 50 ? 'warning' : ''}" style="width:${p.completeness}%"></div>
            </div>
            <span style="font-weight:600;">${p.completeness}%</span>
          </div>
          <div class="text-sm text-muted">5 of 12 required fields completed</div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Workflows</div>
          <div class="text-sm text-muted">No active workflows</div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Sufficiency Score</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;">
              <span>Amazon</span>
              <span style="color:var(--success);">92%</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;">
              <span>Shopify</span>
              <span style="color:var(--warning);">78%</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;">
              <span>eBay</span>
              <span style="color:var(--error);">45%</span>
            </div>
          </div>
        </div>
        <div class="panel-collapsed-bar">
          <button class="expand-btn" onclick="togglePanel('detailSidebar')" title="Expand Info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="panel-label">Info</span>
        </div>
      `;
    }

    // ==================== EVENT HANDLERS ====================
    function switchMainTab(tabId) {
      state.activeMainTab = tabId;
      renderMainNav();
      showToast(`Switched to ${mainNavTabs.find(t => t.id === tabId)?.label}`, 'info');
    }

    function switchView(view) {
      state.currentView = view;
      renderBreadcrumb(); // Update navigation context
      renderToolbar();
      renderContent();
    }

    function switchDetailTab(tabId) {
      state.activeDetailTab = tabId;
      renderDetailMain();
    }

    function switchRelationView(view) {
      state.relationView = view;
      renderDetailMain();
    }

    function selectRelationType(type) {
      state.selectedRelationType = type;
      state.checkedRelations = []; // Clear selection when changing type
      renderDetailMain();
    }

    function switchAssetView(view) {
      state.assetView = view;
      renderDetailMain();
    }

    // Relations checkbox handlers
    function toggleRelationCheckbox(index, event) {
      event.stopPropagation();
      const idx = state.checkedRelations.indexOf(index);
      if (idx > -1) {
        state.checkedRelations.splice(idx, 1);
      } else {
        state.checkedRelations.push(index);
      }
      renderDetailMain();
    }

    function toggleAllRelationCheckboxes() {
      const p = getCurrentProduct();
      if (!p) return;
      const productRelations = relations.filter(r => r.productId === p.id);
      if (state.checkedRelations.length === productRelations.length) {
        state.checkedRelations = [];
      } else {
        state.checkedRelations = productRelations.map((_, i) => i);
      }
      renderDetailMain();
    }

    function deleteRelations() {
      showToast(`Deleted ${state.checkedRelations.length} relation(s)`, 'success');
      state.checkedRelations = [];
      renderDetailMain();
    }

    // Assets checkbox handlers
    function toggleAssetCheckbox(index, event) {
      event.stopPropagation();
      const idx = state.checkedAssets.indexOf(index);
      if (idx > -1) {
        state.checkedAssets.splice(idx, 1);
      } else {
        state.checkedAssets.push(index);
      }
      renderDetailMain();
    }

    function toggleAllAssetCheckboxes() {
      if (state.checkedAssets.length === assets.length) {
        state.checkedAssets = [];
      } else {
        state.checkedAssets = assets.map((_, i) => i);
      }
      renderDetailMain();
    }

    function selectAsset(index) {
      state.selectedAsset = index;
      renderDetailMain();
    }

    function deleteAssets() {
      showToast(`Deleted ${state.checkedAssets.length} asset(s)`, 'success');
      state.checkedAssets = [];
      renderDetailMain();
    }

    function selectCategory(id) {
      state.selectedCategoryId = id;
      state.viewingCategoryAsProduct = false;
      state.viewedCategoryId = null;
      state.selectedItemIndex = 0;
      state.checkedItems = [];
      renderCategoryTree();
      renderBreadcrumb();
      renderToolbar();
      renderContent();
    }

    function viewCategoryDetails(id) {
      const category = findCategoryById(id);
      if (category) {
        state.viewedCategoryId = id;
        state.viewingCategoryAsProduct = true;
        state.activeItemId = id;
        state.slidePanelOpen = true;
        
        // Find the index in displayed items
        const items = getDisplayedItems();
        const index = items.findIndex(p => p.id === id);
        if (index !== -1) {
          state.selectedItemIndex = index;
        }
        
        // Don't change selectedCategoryId - keep tree selection
        if (!state.selectedCategoryId) {
          state.selectedCategoryId = id;
          renderCategoryTree();
        }
        renderToolbar();
        renderContent();
        renderSlidePanel();
      }
    }

    function findCategoryById(id, cats = categories) {
      for (const cat of cats) {
        if (cat.id === id) return cat;
        if (cat.children) {
          const found = findCategoryById(id, cat.children);
          if (found) return found;
        }
      }
      return null;
    }

    function toggleTreeNode(id) {
      // Toggle tree expansion
    }

    function selectItem(index) {
      // Get items BEFORE changing state
      const items = getDisplayedItems();
      const item = items[index];
      
      // Store the item being viewed for details
      state.selectedItemIndex = index;
      
      // Also set as active item
      if (item) {
        state.activeItemId = item.id;
      }
      
      if (item && Array.isArray(item.children)) {
        // It's a category - view it as a product
        state.viewingCategoryAsProduct = true;
        state.viewedCategoryId = item.id;
      } else {
        // It's a product
        state.viewingCategoryAsProduct = false;
        state.viewedCategoryId = null;
      }
      
      // Don't re-render tree - selection hasn't changed
      renderBreadcrumb(); // Update navigation context
      renderItemList();
      renderDetailMain();
      renderDetailSidebar();
      renderToolbar();
    }
    
    function setActiveItem(id) {
      // Set active item (persists across view switches)
      state.activeItemId = id;
      
      // Find the index of this item in the displayed items
      const items = getDisplayedItems();
      const index = items.findIndex(p => p.id === id);
      if (index !== -1) {
        state.selectedItemIndex = index;
        const item = items[index];
        
        // Set viewing context based on item type
        if (Array.isArray(item.children)) {
          state.viewingCategoryAsProduct = true;
          state.viewedCategoryId = item.id;
        } else {
          state.viewingCategoryAsProduct = false;
          state.viewedCategoryId = null;
        }
      }
      
      // Open the slide panel (Jira-style)
      state.slidePanelOpen = true;
      
      // Re-render to show active state and panel
      renderContent();
      renderSlidePanel();
    }
    
    function openSlidePanel() {
      state.slidePanelOpen = true;
      document.getElementById('slidePanel').classList.add('open');
      renderSlidePanel();
    }
    
    function closeSlidePanel() {
      state.slidePanelOpen = false;
      state.activeItemId = null;
      document.getElementById('slidePanel').classList.remove('open');
      renderContent(); // Re-render to remove active highlight
    }
    
    function renderSlidePanel() {
      let item;
      let navInfo = '';
      let showNav = false;
      
      // Check if we're viewing a category via breadcrumb (viewedCategoryId)
      if (state.viewingCategoryAsProduct && state.viewedCategoryId) {
        item = findCategoryById(state.viewedCategoryId);
        navInfo = 'Category';
        showNav = false; // No prev/next for category view
      } else {
        // Viewing an item from the list
        const items = getDisplayedItems();
        item = items[state.selectedItemIndex];
        navInfo = `${state.selectedItemIndex + 1} of ${items.length}`;
        showNav = items.length > 1;
        
        document.getElementById('panelPrevBtn').disabled = state.selectedItemIndex === 0;
        document.getElementById('panelNextBtn').disabled = state.selectedItemIndex >= items.length - 1;
      }
      
      if (!item) return;
      
      // Update header
      document.getElementById('slidePanelName').textContent = item.name;
      document.getElementById('slidePanelId').textContent = item.id;
      
      // Update navigation info
      document.getElementById('slidePanelNavInfo').textContent = navInfo;
      
      // Show/hide nav buttons based on context
      const navButtons = document.querySelector('.slide-panel-nav-buttons');
      if (navButtons) {
        navButtons.style.display = showNav ? 'flex' : 'none';
      }
      
      // Update panel visibility
      const panel = document.getElementById('slidePanel');
      if (state.slidePanelOpen) {
        panel.classList.add('open');
      } else {
        panel.classList.remove('open');
      }
      
      // Render tabs
      renderSlidePanelTabs();
      
      // Render content based on active tab
      renderSlidePanelContent(item);
    }
    
    function renderSlidePanelTabs() {
      const tabs = document.getElementById('slidePanelTabs');
      const tabItems = [
        { id: 'basic', label: 'Details' },
        { id: 'specs', label: 'Specifications' },
        { id: 'relations', label: 'Relations' },
        { id: 'assets', label: 'Assets' }
      ];
      
      tabs.innerHTML = `
        <div style="display:flex;border-bottom:1px solid var(--border);background:var(--bg-elevated);">
          ${tabItems.map(t => `
            <button onclick="setSlidePanelTab('${t.id}')" 
                    style="padding:10px 16px;font-size:12px;font-weight:500;border:none;background:transparent;
                           color:${state.slidePanelTab === t.id ? 'var(--accent)' : 'var(--text-muted)'};
                           border-bottom:2px solid ${state.slidePanelTab === t.id ? 'var(--accent)' : 'transparent'};
                           cursor:pointer;transition:all 0.15s;">
              ${t.label}
            </button>
          `).join('')}
        </div>
      `;
    }
    
    function setSlidePanelTab(tabId) {
      state.slidePanelTab = tabId;
      renderSlidePanelTabs();
      
      let item;
      if (state.viewingCategoryAsProduct && state.viewedCategoryId) {
        item = findCategoryById(state.viewedCategoryId);
      } else {
        const items = getDisplayedItems();
        item = items[state.selectedItemIndex];
      }
      if (item) renderSlidePanelContent(item);
    }
    
    function renderSlidePanelContent(item) {
      const content = document.getElementById('slidePanelContent');
      
      switch (state.slidePanelTab) {
        case 'basic':
          content.innerHTML = renderSlidePanelBasic(item);
          break;
        case 'specs':
          content.innerHTML = renderSlidePanelSpecs(item);
          break;
        case 'relations':
          content.innerHTML = renderSlidePanelRelations(item);
          break;
        case 'assets':
          content.innerHTML = renderSlidePanelAssets(item);
          break;
      }
    }
    
    function renderSlidePanelBasic(item) {
      const isCategory = Array.isArray(item.children);
      return `
        <div style="display:flex;flex-direction:column;gap:16px;">
          <!-- Status & Completeness -->

            <span class="status-badge ${item.status}">${item.status}</span>
            <div style="display:flex;align-items:center;gap:8px;flex:1;">
              <div class="progress-bar" style="flex:1;max-width:120px;">
                <div class="progress-fill ${item.completeness >= 80 ? 'success' : item.completeness >= 50 ? 'warning' : ''}" style="width:${item.completeness}%"></div>
              </div>
              <span style="font-size:12px;color:var(--text-muted);">${item.completeness}%</span>
            </div>
          </div>
          
          <!-- Image -->
          <div style="background:var(--bg-subtle);border-radius:var(--radius-md);height:160px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;opacity:0.5;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          
          <!-- Fields -->
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="slide-field">
              <label style="font-size:11px;color:var(--text-muted);margin-bottom:4px;display:block;">Name</label>
              <input type="text" value="${item.name}" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);font-size:13px;">
            </div>
            <div class="slide-field">
              <label style="font-size:11px;color:var(--text-muted);margin-bottom:4px;display:block;">SKU</label>
              <input type="text" value="${item.sku}" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);font-size:13px;">
            </div>
            ${!isCategory ? `

    // ==================== SORT FUNCTIONS ====================
    function showSortMenu(context = 'products') {
      const fields = sortFields[context];
      const currentSort = context === 'products' ? state.sortField :

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;" aria-hidden="true"><path d="M12 5v14M5 12l7 7 7-7"/></svg>

    function applySort(context) {
      const field = document.getElementById('sortField').value;
      const direction = document.getElementById('sortDir').value;
      
      if (context === 'products') {
        state.sortField = field;
        state.sortDirection = direction;
        sortProducts();
        renderContent();
      } else if (context === 'relations') {
        state.relationSortField = field;
        state.relationSortDirection = direction;
        renderDetailMain();
      } else if (context === 'assets') {
        state.assetSortField = field;
        state.assetSortDirection = direction;
        renderDetailMain();
      }
      
      closeModal();
      showToast(`Sorted by ${field} (${direction})`, 'success');
    }

    function sortProducts() {
      const field = state.sortField;
      const dir = state.sortDirection === 'asc' ? 1 : -1;
      
      products.sort((a, b) => {
        let valA = a[field];
        let valB = b[field];
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();
        if (valA < valB) return -1 * dir;
        if (valA > valB) return 1 * dir;
        return 0;
      });
    }

    function getSortedRelations(productRelations) {
      const field = state.relationSortField;
      const dir = state.relationSortDirection === 'asc' ? 1 : -1;
      
      return [...productRelations].sort((a, b) => {
        let valA = a[field];
        let valB = b[field];
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();
        if (valA < valB) return -1 * dir;
        if (valA > valB) return 1 * dir;
        return 0;
      });
    }

    function getSortedAssets() {
      const field = state.assetSortField;
      const dir = state.assetSortDirection === 'asc' ? 1 : -1;
      
      return [...assets].sort((a, b) => {
        let valA = a[field];
        let valB = b[field];
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();
        if (valA < valB) return -1 * dir;
        if (valA > valB) return 1 * dir;
        return 0;
      });
    }

    // ==================== FILTER FUNCTIONS ====================
    function showFilterPanel(context = 'products') {
      const fields = sortFields[context];
      const currentFilters = context === 'products' ? state.filters :

    function renderFilterRow(filter, index, fields, context) {
      return `
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:12px;background:var(--bg-subtle);border-radius:var(--radius-sm);">
          <select class="form-select" style="flex:1;" onchange="updateFilter('${context}', ${index}, 'field', this.value)">
            ${fields.map(f => `<option value="${f.id}" ${filter.field === f.id ? 'selected' : ''}>${f.label}</option>`).join('')}
          </select>
          <select class="form-select" style="flex:1;" onchange="updateFilter('${context}', ${index}, 'operator', this.value)">
            ${filterOperators.map(op => `<option value="${op.id}" ${filter.operator === op.id ? 'selected' : ''}>${op.label}</option>`).join('')}
          </select>
          <input type="text" class="form-input" style="flex:1;" value="${filter.value || ''}" 
                 onchange="updateFilter('${context}', ${index}, 'value', this.value)"
                 placeholder="Value..." ${filter.operator === 'is_empty' || filter.operator === 'is_not_empty' ? 'disabled' : ''}>
          <button class="field-action-btn" onclick="removeFilter('${context}', ${index})" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      `;
    }

    function addFilter(context) {
      const fields = sortFields[context];
      const filters = context === 'products' ? state.filters : 
                      context === 'relations' ? state.relationFilters : state.assetFilters;
      
      filters.push({ field: fields[0].id, operator: 'contains', value: '' });
      showFilterPanel(context); // Re-render modal
    }

    function removeFilter(context, index) {
      const filters = context === 'products' ? state.filters : 
                      context === 'relations' ? state.relationFilters : state.assetFilters;
      filters.splice(index, 1);
      showFilterPanel(context); // Re-render modal
    }

    function updateFilter(context, index, key, value) {
      const filters = context === 'products' ? state.filters : 
                      context === 'relations' ? state.relationFilters : state.assetFilters;
      filters[index][key] = value;
      
      // Disable value input for empty/not empty operators
      if (key === 'operator' && (value === 'is_empty' || value === 'is_not_empty')) {
        filters[index].value = '';
      }
    }

    function clearFilters(context) {
      if (context === 'products') {
        state.filters = [];
      } else if (context === 'relations') {
        state.relationFilters = [];
      } else if (context === 'assets') {
        state.assetFilters = [];
      }
      closeModal();
      
      if (context === 'products') {
        renderToolbar();
        renderContent();
      } else {
        renderDetailMain();
      }
      showToast('Filters cleared', 'info');
    }

    function applyFilters(context) {
      closeModal();
      
      if (context === 'products') {
        renderToolbar();
        renderContent();
      } else {
        renderDetailMain();
      }
      
      const count = context === 'products' ? state.filters.length : 
                    context === 'relations' ? state.relationFilters.length : state.assetFilters.length;
      showToast(`Applied ${count} filter(s)`, 'success');
    }

    function matchesFilter(item, filter) {
      const value = String(item[filter.field] || '').toLowerCase();
      const filterValue = (filter.value || '').toLowerCase();
      
      switch (filter.operator) {
        case 'contains': return value.includes(filterValue);
        case 'equals': return value === filterValue;
        case 'not_equals': return value !== filterValue;
        case 'starts_with': return value.startsWith(filterValue);
        case 'ends_with': return value.endsWith(filterValue);
        case 'is_empty': return !value || value.trim() === '';
        case 'is_not_empty': return value && value.trim() !== '';
        default: return true;
      }
    }

    function getDisplayedItems() {
      // Get items to display based on selected category (tree selection)
      // List shows ONLY children - parent is accessed via breadcrumb/toolbar
      let items;
      
      if (state.selectedCategoryId) {
        const selectedCat = findCategoryById(state.selectedCategoryId);
        if (selectedCat && selectedCat.children && selectedCat.children.length > 0) {
          // Show children only
          items = selectedCat.children;
        } else if (selectedCat) {
          // Leaf category - show products in this category
          items = products.filter(p => p.category === selectedCat?.name);
        } else {
          items = categories;
        }
      } else {
        // No category selected - show root categories
        items = categories;
      }
      
      return items;
    }
    
    function findParentCategory(id, cats = categories, parent = null) {
      for (const cat of cats) {
        if (cat.id === id) return parent;
        if (cat.children && cat.children.length > 0) {
          const found = findParentCategory(id, cat.children, cat);
          if (found !== undefined) return found;
        }
      }
      return undefined;
    }
    
    function getFilteredProducts() {
      let items = getDisplayedItems();
      
      // Apply filters
      if (state.filters.length > 0) {
        items = items.filter(p => state.filters.every(f => matchesFilter(p, f)));
      }
      
      return items;
    }

    function getFilteredRelations(productRelations) {
      let result = productRelations;
      if (state.relationFilters.length > 0) {
        result = result.filter(r => state.relationFilters.every(f => matchesFilter(r, f)));
      }
      return getSortedRelations(result);
    }

    function getFilteredAssets() {
      let result = assets;
      if (state.assetFilters.length > 0) {
        result = result.filter(a => state.assetFilters.every(f => matchesFilter(a, f)));
      }
      return getSortedAssets();
    }

    // ==================== UTILITIES ====================
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.setAttribute('role', 'status');
      toast.setAttribute('aria-live', 'polite');
      toast.textContent = message;
      container.appendChild(toast);
      
      // Auto-remove after 3 seconds
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    let lastFocusedElement = null;
    
    function showModal(title, body, footer = '') {
      // Store the currently focused element to restore later
      lastFocusedElement = document.activeElement;
      
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = footer;
      
      const overlay = document.getElementById('modalOverlay');
      overlay.classList.add('active');
      
      // Focus the first focusable element in the modal
      setTimeout(() => {
        const modal = document.getElementById('modal');
        const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (focusable.length > 0) {
          focusable[0].focus();
        } else {
          modal.querySelector('.modal-close')?.focus();
        }
      }, 50);
      
      // Trap focus within modal
      overlay.addEventListener('keydown', trapFocus);
    }

    function closeModal() {
      const overlay = document.getElementById('modalOverlay');
      overlay.classList.remove('active');
      overlay.removeEventListener('keydown', trapFocus);
      
      // Restore focus to the element that opened the modal
      if (lastFocusedElement) {
        lastFocusedElement.focus();
        lastFocusedElement = null;
      }
    }
    
    // ==================== TOOLBAR DROPDOWN ====================
    function toggleToolbarMore(event) {
      event.stopPropagation();
      const menu = document.getElementById('toolbarMoreMenu');
      const btn = event.currentTarget;
      const isOpen = menu.classList.contains('open');
      
      // Close any other open dropdowns first
      closeAllDropdowns();
      
      if (!isOpen) {
        menu.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        
        // Focus first item for accessibility
        const firstItem = menu.querySelector('.dropdown-item');
        if (firstItem) firstItem.focus();
      }
    }
    
    function closeToolbarMore() {
      const menu = document.getElementById('toolbarMoreMenu');
      if (menu) {
        menu.classList.remove('open');
        const btn = menu.previousElementSibling;
        if (btn) btn.setAttribute('aria-expanded', 'false');
      }
    }
    
    function closeAllDropdowns() {
      document.querySelectorAll('.dropdown-menu.open').forEach(menu => {
        menu.classList.remove('open');
        const btn = menu.previousElementSibling;
        if (btn) btn.setAttribute('aria-expanded', 'false');
      });
    }
    
    // Close dropdowns when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        closeAllDropdowns();
      }
    });
    
    // Close dropdowns on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeAllDropdowns();
      }
    });
    
    function trapFocus(event) {
      if (event.key !== 'Tab') return;
      
      const modal = document.getElementById('modal');
      const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
      const firstFocusable = focusable[0];
      const lastFocusable = focusable[focusable.length - 1];
      
      if (event.shiftKey) {
        if (document.activeElement === firstFocusable) {
          event.preventDefault();
          lastFocusable.focus();
        }
      } else {
        if (document.activeElement === lastFocusable) {
          event.preventDefault();
          firstFocusable.focus();
        }
      }
    }

    function setupResizeHandles() {
      document.querySelectorAll('.resize-handle').forEach(handle => {
        handle.addEventListener('mousedown', initResize);
      });
    }

    function initResize(e) {
      const handle = e.target;
      const targetId = handle.dataset.resize;
      const target = document.getElementById(targetId);
      if (!target) return;

      const startX = e.clientX;
      const startWidth = target.offsetWidth;
      const isRight = handle.previousElementSibling === target;

      function doResize(e) {
        const diff = e.clientX - startX;
        const newWidth = isRight ? startWidth + diff : startWidth - diff;
        target.style.width = Math.max(150, Math.min(500, newWidth)) + 'px';
      }

      function stopResize() {
        document.removeEventListener('mousemove', doResize);
        document.removeEventListener('mouseup', stopResize);
      }

      document.addEventListener('mousemove', doResize);
      document.addEventListener('mouseup', stopResize);
    }

    // ==================== INITIALIZE ====================
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
