            filter: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`,
            search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
            grid: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
            list: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
            table: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`,
            columns: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>`,
            sort: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>`,
            arrowUp: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"/></svg>`,
            arrowDown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>`,
            close: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
            link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
            external: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
            clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            star: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
        };

        // ============================================
        // GENERATE MOCK DATA WITH SCALE
        // ============================================
        const brands = ['TechPro', 'NexGen', 'ProLine', 'EliteTech', 'SmartCore', 'VisionMax', 'CoreTech', 'PrimeTech'];
        const owners = ['Sarah Chen', 'Michael Torres', 'Emma Wilson', 'David Kim', 'Lisa Park', 'James Roberts', 'Anna Martinez', 'Robert Lee'];
        const statuses = ['published', 'review', 'draft'];
        const colors = ['Black', 'White', 'Silver', 'Gold', 'Blue', 'Red', 'Green', 'Space Gray'];

        function generateProducts(familyId, prefix, count, categoryBase) {
            const products = [];
            for (let i = 1; i <= count; i++) {
                const status = statuses[Math.floor(Math.random() * 3)];
                const completeness = status === 'published' ? 85 + Math.floor(Math.random() * 16) : 
                                     status === 'review' ? 60 + Math.floor(Math.random() * 25) :
                                     30 + Math.floor(Math.random() * 30);
                const issues = status === 'published' ? 0 : Math.floor(Math.random() * (status === 'draft' ? 8 : 4));
                
                products.push({
                    id: `prod-${familyId}-${String(i).padStart(3, '0')}`,
                    familyId: familyId,
                    name: `${prefix} ${String(i).padStart(3, '0')}`,
                    sku: `${familyId.toUpperCase()}-${String(i).padStart(4, '0')}`,
                    status: status,
                    completeness: completeness,
                    issues: issues,
                    lastEdited: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString(),
                    owner: owners[Math.floor(Math.random() * owners.length)],
                    description: `High-quality ${prefix.toLowerCase()} with premium features and exceptional performance.`,
                    price: (Math.random() * 500 + 50).toFixed(2),
                    brand: brands[Math.floor(Math.random() * brands.length)],
                    weight: `${(Math.random() * 5 + 0.1).toFixed(1)}kg`,
                    dimensions: `${Math.floor(Math.random() * 50 + 10)} x ${Math.floor(Math.random() * 40 + 10)} x ${Math.floor(Math.random() * 20 + 5)}cm`,
                    attributes: {
                        color: colors[Math.floor(Math.random() * colors.length)],
                        material: ['Aluminum', 'Plastic', 'Steel', 'Carbon Fiber'][Math.floor(Math.random() * 4)],
                        warranty: ['1 year', '2 years', '3 years', '5 years'][Math.floor(Math.random() * 4)],
                        origin: ['USA', 'China', 'Germany', 'Japan', 'South Korea'][Math.floor(Math.random() * 5)]
                    },
                    assetIds: Array.from({length: Math.floor(Math.random() * 5) + 1}, (_, j) => `asset-${familyId}-${i}-${j+1}`),
                    supplierIds: [`supplier-${Math.floor(Math.random() * 10) + 1}`],
                    categoryIds: [`cat-${categoryBase}`, `cat-${categoryBase}-sub-${Math.floor(Math.random() * 3) + 1}`]
                });
            }
            return products;
        }

        function generateAssets(products) {
            const assets = [];
            const assetTypes = ['image', 'document', 'video'];
            const formats = { image: ['JPEG', 'PNG', 'WebP'], document: ['PDF', 'DOCX'], video: ['MP4', 'MOV'] };
            
            products.forEach(product => {
                product.assetIds.forEach((assetId, idx) => {
                    const type = idx === 0 ? 'image' : assetTypes[Math.floor(Math.random() * 3)];
                    assets.push({
                        id: assetId,
                        name: `${product.name.replace(/\s/g, '-').toLowerCase()}-${idx === 0 ? 'main' : ['detail', 'lifestyle', 'spec', 'manual'][idx % 4]}.${formats[type][0].toLowerCase()}`,
                        type: type,
                        format: formats[type][Math.floor(Math.random() * formats[type].length)],
                        size: `${(Math.random() * 10 + 0.5).toFixed(1)} MB`,
                        dimensions: type === 'image' ? `${2000 + Math.floor(Math.random() * 2000)}x${1500 + Math.floor(Math.random() * 1500)}` : null,
                        uploadDate: new Date(Date.now() - Math.random() * 60 * 24 * 60 * 60 * 1000).toISOString(),
                        usedBy: [product.id],
                        thumbnail: type === 'image' ? `https://picsum.photos/seed/${assetId}/400/300` : null
                    });
                });
            });
            return assets;
        }

        function generateSuppliers(count) {
            const supplierNames = ['Global Supply Co', 'Prime Distributors', 'Elite Manufacturing', 'Pacific Trade', 'Atlantic Partners', 'Continental Goods', 'Universal Imports', 'Direct Source Ltd', 'Quality First Inc', 'Express Logistics'];
            return Array.from({length: count}, (_, i) => ({
                id: `supplier-${i + 1}`,
                name: supplierNames[i % supplierNames.length],
                code: `SUP-${String(i + 1).padStart(3, '0')}`,
                country: ['USA', 'China', 'Germany', 'Japan', 'South Korea', 'Taiwan', 'Vietnam', 'Mexico'][Math.floor(Math.random() * 8)],
                rating: (3 + Math.random() * 2).toFixed(1),
                status: Math.random() > 0.2 ? 'active' : 'inactive',
                email: `contact@supplier${i + 1}.com`,
                leadTime: `${Math.floor(Math.random() * 14) + 7} days`
            }));
        }

        function generateCategories() {
            return {
                'cat-electronics': { id: 'cat-electronics', name: 'Electronics', parent: null, children: ['cat-electronics-sub-1', 'cat-electronics-sub-2', 'cat-electronics-sub-3'] },
                'cat-electronics-sub-1': { id: 'cat-electronics-sub-1', name: 'Smartphones', parent: 'cat-electronics' },
                'cat-electronics-sub-2': { id: 'cat-electronics-sub-2', name: 'Laptops', parent: 'cat-electronics' },
                'cat-electronics-sub-3': { id: 'cat-electronics-sub-3', name: 'Accessories', parent: 'cat-electronics' },
                'cat-home': { id: 'cat-home', name: 'Home & Garden', parent: null, children: ['cat-home-sub-1', 'cat-home-sub-2', 'cat-home-sub-3'] },
                'cat-home-sub-1': { id: 'cat-home-sub-1', name: 'Furniture', parent: 'cat-home' },
                'cat-home-sub-2': { id: 'cat-home-sub-2', name: 'Lighting', parent: 'cat-home' },
                'cat-home-sub-3': { id: 'cat-home-sub-3', name: 'Garden Tools', parent: 'cat-home' },
                'cat-sports': { id: 'cat-sports', name: 'Sports & Fitness', parent: null, children: ['cat-sports-sub-1', 'cat-sports-sub-2', 'cat-sports-sub-3'] },
                'cat-sports-sub-1': { id: 'cat-sports-sub-1', name: 'Exercise Equipment', parent: 'cat-sports' },
                'cat-sports-sub-2': { id: 'cat-sports-sub-2', name: 'Outdoor Gear', parent: 'cat-sports' },
                'cat-sports-sub-3': { id: 'cat-sports-sub-3', name: 'Sportswear', parent: 'cat-sports' }
            };
        }

        // ============================================
        // HIERARCHICAL TREE STRUCTURE (4-6 levels)
        // ============================================
        // Level types: division > line > family > subfamily > product > variant
        
        function createHierarchyNode(id, name, type, parentId, extra = {}) {
            const status = ['published', 'review', 'draft'][Math.floor(Math.random() * 3)];
            const completeness = status === 'published' ? 80 + Math.floor(Math.random() * 21) : 
                                 status === 'review' ? 55 + Math.floor(Math.random() * 25) : 
                                 25 + Math.floor(Math.random() * 35);
            return {
                id,
                name,
                type, // 'division', 'line', 'family', 'subfamily', 'product', 'variant'
                parentId,
                sku: `${type.toUpperCase().slice(0,3)}-${id.split('-').pop()}`,
                status: extra.status || status,
                completeness: extra.completeness || completeness,
                issues: extra.issues !== undefined ? extra.issues : (status === 'published' ? 0 : Math.floor(Math.random() * 5)),
                lastEdited: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString(),
                owner: owners[Math.floor(Math.random() * owners.length)],
                description: extra.description || `${name} - ${type} level node`,
                ...extra
            };
        }

        // Build the complete hierarchy
        const hierarchy = {};
        
        // Level 1: Divisions
        hierarchy['div-electronics'] = createHierarchyNode('div-electronics', 'Consumer Electronics', 'division', null, { status: 'published', completeness: 87 });
        hierarchy['div-home'] = createHierarchyNode('div-home', 'Home & Living', 'division', null, { status: 'review', completeness: 72 });
        hierarchy['div-sports'] = createHierarchyNode('div-sports', 'Sports & Outdoors', 'division', null, { status: 'draft', completeness: 58 });

        // Level 2: Product Lines (under Electronics)
        hierarchy['line-mobile'] = createHierarchyNode('line-mobile', 'Mobile Devices', 'line', 'div-electronics', { status: 'published', completeness: 91 });
        hierarchy['line-computing'] = createHierarchyNode('line-computing', 'Computing', 'line', 'div-electronics', { status: 'published', completeness: 85 });
        hierarchy['line-audio'] = createHierarchyNode('line-audio', 'Audio & Video', 'line', 'div-electronics', { status: 'review', completeness: 68 });

        // Level 2: Product Lines (under Home)
        hierarchy['line-furniture'] = createHierarchyNode('line-furniture', 'Furniture', 'line', 'div-home', { status: 'review', completeness: 75 });
        hierarchy['line-garden'] = createHierarchyNode('line-garden', 'Garden & Outdoor', 'line', 'div-home', { status: 'draft', completeness: 62 });
        hierarchy['line-kitchen'] = createHierarchyNode('line-kitchen', 'Kitchen & Dining', 'line', 'div-home', { status: 'published', completeness: 82 });

        // Level 2: Product Lines (under Sports)
        hierarchy['line-fitness'] = createHierarchyNode('line-fitness', 'Fitness Equipment', 'line', 'div-sports', { status: 'review', completeness: 65 });
        hierarchy['line-outdoor'] = createHierarchyNode('line-outdoor', 'Outdoor Recreation', 'line', 'div-sports', { status: 'draft', completeness: 48 });

        // Level 3: Families (under Mobile Devices)
        hierarchy['fam-smartphones'] = createHierarchyNode('fam-smartphones', 'Smartphones', 'family', 'line-mobile', { status: 'published', completeness: 94 });
        hierarchy['fam-tablets'] = createHierarchyNode('fam-tablets', 'Tablets', 'family', 'line-mobile', { status: 'published', completeness: 88 });
        hierarchy['fam-wearables'] = createHierarchyNode('fam-wearables', 'Wearables', 'family', 'line-mobile', { status: 'review', completeness: 72 });

        // Level 3: Families (under Computing)
        hierarchy['fam-laptops'] = createHierarchyNode('fam-laptops', 'Laptops', 'family', 'line-computing', { status: 'published', completeness: 89 });
        hierarchy['fam-desktops'] = createHierarchyNode('fam-desktops', 'Desktops', 'family', 'line-computing', { status: 'review', completeness: 78 });
        hierarchy['fam-accessories'] = createHierarchyNode('fam-accessories', 'Accessories', 'family', 'line-computing', { status: 'published', completeness: 85 });

        // Level 3: Families (under Furniture)
        hierarchy['fam-office'] = createHierarchyNode('fam-office', 'Office Furniture', 'family', 'line-furniture', { status: 'published', completeness: 82 });
        hierarchy['fam-living'] = createHierarchyNode('fam-living', 'Living Room', 'family', 'line-furniture', { status: 'review', completeness: 68 });

        // Level 3: Families (under Fitness)
        hierarchy['fam-cardio'] = createHierarchyNode('fam-cardio', 'Cardio Equipment', 'family', 'line-fitness', { status: 'review', completeness: 70 });
        hierarchy['fam-strength'] = createHierarchyNode('fam-strength', 'Strength Training', 'family', 'line-fitness', { status: 'draft', completeness: 55 });

        // Level 4: Subfamilies (under Smartphones) - THIS IS WHERE WE GET 200+ PRODUCTS
        hierarchy['sub-flagship'] = createHierarchyNode('sub-flagship', 'Flagship Series', 'subfamily', 'fam-smartphones', { status: 'published', completeness: 96 });
        hierarchy['sub-midrange'] = createHierarchyNode('sub-midrange', 'Mid-Range Series', 'subfamily', 'fam-smartphones', { status: 'published', completeness: 92 });
        hierarchy['sub-budget'] = createHierarchyNode('sub-budget', 'Budget Series', 'subfamily', 'fam-smartphones', { status: 'review', completeness: 78 });

        // Level 4: Subfamilies (under Laptops)
        hierarchy['sub-pro'] = createHierarchyNode('sub-pro', 'Pro Workstations', 'subfamily', 'fam-laptops', { status: 'published', completeness: 91 });
        hierarchy['sub-ultra'] = createHierarchyNode('sub-ultra', 'Ultrabooks', 'subfamily', 'fam-laptops', { status: 'published', completeness: 88 });
        hierarchy['sub-gaming'] = createHierarchyNode('sub-gaming', 'Gaming Laptops', 'subfamily', 'fam-laptops', { status: 'review', completeness: 75 });

        // Level 4: Subfamilies (under Office Furniture)  
        hierarchy['sub-chairs'] = createHierarchyNode('sub-chairs', 'Office Chairs', 'subfamily', 'fam-office', { status: 'published', completeness: 85 });
        hierarchy['sub-desks'] = createHierarchyNode('sub-desks', 'Desks & Workstations', 'subfamily', 'fam-office', { status: 'review', completeness: 78 });

        // Generate products under subfamilies
        function generateProductsForSubfamily(subfamilyId, prefix, count) {
            const products = [];
            for (let i = 1; i <= count; i++) {
                const status = statuses[Math.floor(Math.random() * 3)];
                const completeness = status === 'published' ? 85 + Math.floor(Math.random() * 16) : 
                                     status === 'review' ? 60 + Math.floor(Math.random() * 25) :
                                     30 + Math.floor(Math.random() * 30);
                const issues = status === 'published' ? 0 : Math.floor(Math.random() * (status === 'draft' ? 8 : 4));
                const prodId = `prod-${subfamilyId}-${String(i).padStart(3, '0')}`;
                
                // Add to hierarchy
                hierarchy[prodId] = createHierarchyNode(prodId, `${prefix} ${String(i).padStart(3, '0')}`, 'product', subfamilyId, {
                    status, completeness, issues,
                    price: (Math.random() * 500 + 50).toFixed(2),
                    brand: brands[Math.floor(Math.random() * brands.length)],
                    weight: `${(Math.random() * 5 + 0.1).toFixed(1)}kg`,
                    dimensions: `${Math.floor(Math.random() * 50 + 10)} x ${Math.floor(Math.random() * 40 + 10)} x ${Math.floor(Math.random() * 20 + 5)}cm`,
                    attributes: {
                        color: colors[Math.floor(Math.random() * colors.length)],
                        material: ['Aluminum', 'Plastic', 'Steel', 'Carbon Fiber'][Math.floor(Math.random() * 4)],
                        warranty: ['1 year', '2 years', '3 years', '5 years'][Math.floor(Math.random() * 4)],
                        origin: ['USA', 'China', 'Germany', 'Japan', 'South Korea'][Math.floor(Math.random() * 5)]
                    },
                    assetIds: Array.from({length: Math.floor(Math.random() * 5) + 1}, (_, j) => `asset-${prodId}-${j+1}`),
                    supplierIds: [`supplier-${Math.floor(Math.random() * 10) + 1}`]
                });
                
                products.push(hierarchy[prodId]);
                
                // Add variants for some products (Level 6)
                if (i <= 5) {
                    const variantColors = ['Black', 'White', 'Silver'];
                    const variantStorage = ['128GB', '256GB', '512GB'];
                    variantColors.forEach((color, ci) => {
                        const varId = `var-${prodId}-${ci + 1}`;
                        hierarchy[varId] = createHierarchyNode(varId, `${prefix} ${String(i).padStart(3, '0')} - ${variantStorage[ci]} ${color}`, 'variant', prodId, {
                            status: hierarchy[prodId].status,
                            completeness: hierarchy[prodId].completeness - Math.floor(Math.random() * 10),
                            price: (parseFloat(hierarchy[prodId].price) + ci * 100).toFixed(2),
                            variantOf: prodId
                        });
                    });
                }
            }
            return products;
        }

        // Generate products for each subfamily
        generateProductsForSubfamily('sub-flagship', 'ProMax', 85);
        generateProductsForSubfamily('sub-midrange', 'ProLine', 75);
        generateProductsForSubfamily('sub-budget', 'ValuePhone', 55);
        generateProductsForSubfamily('sub-pro', 'WorkStation Pro', 25);
        generateProductsForSubfamily('sub-ultra', 'UltraSlim', 30);
        generateProductsForSubfamily('sub-gaming', 'GameForce', 20);
        generateProductsForSubfamily('sub-chairs', 'ErgoChair', 18);
        generateProductsForSubfamily('sub-desks', 'SmartDesk', 15);

        // Helper to get children of any node
        function getChildNodes(parentId) {
            return Object.values(hierarchy).filter(node => node.parentId === parentId);
        }

        // Helper to get all descendants (products) under a node
        function getAllDescendantProducts(nodeId) {
            const products = [];
            const node = hierarchy[nodeId];
            if (!node) return products;
            
            if (node.type === 'product') {
                products.push(node);
            } else {
                getChildNodes(nodeId).forEach(child => {
                    products.push(...getAllDescendantProducts(child.id));
                });
            }
            return products;
        }

        // Get root nodes (divisions)
        function getRootNodes() {
            return Object.values(hierarchy).filter(node => node.parentId === null);
        }

        // Generate assets for all products
        const allProductNodes = Object.values(hierarchy).filter(n => n.type === 'product');
        const allAssets = generateAssets(allProductNodes);
        const allSuppliers = generateSuppliers(10);
        const allCategories = generateCategories();

        const mockData = {
            hierarchy: hierarchy,
            products: allProductNodes,
            assets: allAssets,
            suppliers: allSuppliers,
            categories: allCategories,
            getNode: (id) => hierarchy[id],
            getChildren: getChildNodes,
            getRoots: getRootNodes,
            getDescendantProducts: getAllDescendantProducts
        };

        // ============================================
        // APPLICATION STATE
        // ============================================
        const state = {
            currentRoute: null,
            currentEntity: null,
            currentTab: 0,
            navigationHistory: [],
            expandedNodes: new Set(['div-electronics', 'line-mobile', 'fam-smartphones', 'div-home', 'div-sports']),
            selectedRows: new Set(),
            viewMode: 'table',
            filters: {
                status: null,
                completeness: null,
                search: ''
            },
            sort: { column: 'name', direction: 'asc' },
            pagination: { page: 1, pageSize: 25 },
            referenceType: 'assets'
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getCompletenessClass(value) {
            if (value >= 80) return 'high';
            if (value >= 50) return 'medium';
            return 'low';
        }

        function getStatusClass(status) {
            return `status-${status}`;
        }

        function getEntity(type, id) {
            if (type === 'node' || type === 'family' || type === 'product' || type === 'division' || type === 'line' || type === 'subfamily' || type === 'variant') {
                return mockData.getNode(id);
            }
            if (type === 'asset') return mockData.assets.find(a => a.id === id);
            if (type === 'supplier') return mockData.suppliers.find(s => s.id === id);
            return null;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================
        // ROUTER
        // ============================================
        function navigate(path, pushState = true) {
            if (state.currentRoute && state.currentRoute !== path) {
                state.navigationHistory.push(state.currentRoute);
            }
            state.currentRoute = path;
            state.selectedRows.clear();
            state.pagination.page = 1;
            
            if (pushState) {
                window.location.hash = path;
            }
            
            renderPage();
            updateBackButton();
            updateSidebarActive();
        }

        function goBack() {
            if (state.navigationHistory.length > 0) {
                const prevRoute = state.navigationHistory.pop();
                state.currentRoute = prevRoute;
                window.location.hash = prevRoute;
                renderPage();
                updateBackButton();
                updateSidebarActive();
            }
        }

        function updateBackButton() {
            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.style.display = state.navigationHistory.length > 0 ? 'flex' : 'none';
            }
        }

        function parseRoute(path) {
            if (!path) return { type: 'home' };
            const parts = path.split('/').filter(Boolean);
            if (parts.length === 0) return { type: 'home' };
            if (parts[0] === 'node' && parts[1]) return { type: 'node', id: parts[1] };
            if (parts[0] === 'families' && parts[1]) return { type: 'node', id: parts[1] };
            if (parts[0] === 'products' && parts[1]) return { type: 'node', id: parts[1] };
            if (parts[0] === 'assets' && parts[1]) return { type: 'asset', id: parts[1] };
            if (parts[0] === 'search') return { type: 'search', query: parts[1] || '' };
            return { type: 'home' };
        }

        function handleGlobalSearch(event) {
            if (event.key === 'Enter') {
                const query = event.target.value.trim();
                if (query) {
                    navigate(`/search/${encodeURIComponent(query)}`);
                }
            }
        }

        // ============================================
        // SIDEBAR RENDERING
        // ============================================
        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            const rootNodes = mockData.getRoots();
            
            nav.innerHTML = `
                <div class="nav-section">
                    <div class="nav-section-title">Navigation</div>
                    <div class="nav-item ${state.currentRoute?.startsWith('/search') ? 'active' : ''}" onclick="navigate('/search')">
                        ${icons.search} Search
                    </div>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Product Hierarchy</div>
                    ${rootNodes.map(node => renderTreeNode(node, 0)).join('')}
                </div>
            `;
            attachTreeListeners();
        }

        function getNodeIcon(type) {
            const iconMap = {
                'division': icons.category,
                'line': icons.family,
                'family': icons.family,
                'subfamily': icons.product,
                'product': icons.product,
                'variant': icons.link
            };
            return iconMap[type] || icons.product;
        }

        function renderTreeNode(node, depth) {
            const isExpanded = state.expandedNodes.has(node.id);
            const isActive = state.currentEntity?.id === node.id;
            const children = mockData.getChildren(node.id);
            const hasChildren = children.length > 0;
            
            // For product-level nodes, count descendants
            const descendantCount = node.type === 'product' || node.type === 'variant' ? 0 : 
                                    mockData.getDescendantProducts(node.id).length;
            
            // Limit visible children for large lists
            const maxVisible = 12;
            const visibleChildren = children.slice(0, maxVisible);
            const hasMore = children.length > maxVisible;
            
            // Determine indentation based on depth
            const paddingLeft = 16 + (depth * 16);
            
            return `
                <div class="tree-node" data-id="${node.id}">
                    <div class="tree-item ${isActive ? 'active' : ''}" 
                         data-id="${node.id}" 
                         data-type="${node.type}"
                         style="padding-left: ${paddingLeft}px;">
                        <span class="tree-toggle ${hasChildren ? (isExpanded ? 'expanded' : '') : 'no-children'}">${icons.chevron}</span>
                        <span class="tree-icon">${getNodeIcon(node.type)}</span>
                        <span class="tree-label">${node.name}</span>
                        <div class="tree-badges">
                            ${descendantCount > 0 ? `<span class="badge badge-count">${descendantCount}</span>` : ''}
                            <span class="badge badge-completeness ${getCompletenessClass(node.completeness)}">${node.completeness}%</span>
                            ${node.issues > 0 ? `<span class="badge badge-issues">${node.issues}</span>` : ''}
                        </div>
                    </div>
                    ${hasChildren ? `
                        <div class="tree-children ${isExpanded ? 'expanded' : ''}">
                            ${visibleChildren.map(child => renderTreeNode(child, depth + 1)).join('')}
                            ${hasMore ? `
                                <div class="tree-item tree-more" 
                                     onclick="event.stopPropagation(); navigate('/node/${node.id}');" 
                                     style="padding-left: ${paddingLeft + 16}px; color: var(--primary);">
                                    <span class="tree-toggle no-children">${icons.chevron}</span>
                                    <span class="tree-icon" style="opacity: 0;">${icons.product}</span>
                                    <span class="tree-label" style="font-style: italic;">View all ${children.length} items...</span>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function attachTreeListeners() {
            document.querySelectorAll('.tree-toggle').forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const nodeId = toggle.closest('.tree-node')?.dataset.id || toggle.closest('.tree-item')?.dataset.id;
                    if (nodeId) {
                        if (state.expandedNodes.has(nodeId)) {
                            state.expandedNodes.delete(nodeId);
                        } else {
                            state.expandedNodes.add(nodeId);
                        }
                        renderSidebar();
                    }
                });
            });

            document.querySelectorAll('.tree-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = item.dataset.id;
                    const type = item.dataset.type;
                    if (type === 'family') navigate(`/families/${id}`);
                    else if (type === 'product') navigate(`/products/${id}`);
                });
            });
        }

        function updateSidebarActive() {
            document.querySelectorAll('.tree-item, .nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (state.currentRoute?.startsWith('/search')) {
                document.querySelector('.nav-item')?.classList.add('active');
            } else if (state.currentEntity) {
                const item = document.querySelector(`.tree-item[data-id="${state.currentEntity.id}"]`);
                if (item) item.classList.add('active');
            }
        }

        // ============================================
        // MAIN PAGE RENDERING
        // ============================================
        function renderPage() {
            const route = parseRoute(state.currentRoute || '/node/div-electronics');
            state.currentTab = 0;
            
            if (route.type === 'node') {
                const node = mockData.getNode(route.id);
                if (node) {
                    state.currentEntity = node;
                    renderNodePage(node);
                } else {
                    // Fallback to first root node
                    const roots = mockData.getRoots();
                    state.currentEntity = roots[0];
                    renderNodePage(roots[0]);
                }
            } else if (route.type === 'asset') {
                const asset = getEntity('asset', route.id);
                if (asset) {
                    state.currentEntity = asset;
                    renderAssetPage(asset);
                }
            } else if (route.type === 'search') {
                state.currentEntity = null;
                renderSearchPage(decodeURIComponent(route.query || ''));
            } else {
                const roots = mockData.getRoots();
                state.currentEntity = roots[0];
                renderNodePage(roots[0]);
            }
        }

        // Build breadcrumb path from node to root
        function getNodePath(nodeId) {
            const path = [];
            let current = mockData.getNode(nodeId);
            while (current) {
                path.unshift(current);
                current = current.parentId ? mockData.getNode(current.parentId) : null;
            }
            return path;
        }

        function renderBreadcrumbs(items) {
            const breadcrumbs = document.getElementById('breadcrumbs');
            breadcrumbs.innerHTML = items.map((item, index) => {
                const isLast = index === items.length - 1;
                return `
                    <span class="breadcrumb-item ${isLast ? 'current' : ''}" ${!isLast ? `onclick="navigate('${item.path}')"` : ''}>${item.label}</span>
                    ${!isLast ? '<span class="breadcrumb-separator">/</span>' : ''}
                `;
            }).join('');
        }

        function switchTab(index) {
            state.currentTab = index;
            state.selectedRows.clear();
            state.pagination.page = 1;
            renderTabContent();
        }

        function renderTabContent() {
            const tabContent = document.getElementById('tabContent');
            if (!tabContent || !state.currentEntity) return;
            
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === state.currentTab);
            });
            
            const entity = state.currentEntity;
            if (entity.familyId) {
                tabContent.innerHTML = renderProductTabContent(entity, state.currentTab);
            } else if (entity.productCount !== undefined) {
                tabContent.innerHTML = renderFamilyTabContent(entity, state.currentTab);
            }
        }

        // ============================================
        // FAMILY PAGE
        // ============================================
        // ============================================
        // NODE PAGE RENDERING (handles all hierarchy levels)
        // ============================================
        function renderNodePage(node) {
            // Build breadcrumbs from path
            const path = getNodePath(node.id);
            const breadcrumbItems = path.map(n => ({ 
                label: n.name, 
                path: `/node/${n.id}` 
            }));
            renderBreadcrumbs(breadcrumbItems);
            
            document.getElementById('headerActions').innerHTML = `
                <button class="btn btn-secondary" onclick="showToast('Changes saved!', 'success')">${icons.save} Save</button>
                <button class="btn btn-secondary" onclick="showToast('Validation complete', 'success')">${icons.validate} Validate</button>
                <button class="btn btn-success" ${node.issues > 0 ? 'disabled' : ''}>${icons.publish} Publish</button>
            `;

            const children = mockData.getChildren(node.id);
            const isLeafProduct = node.type === 'product' || node.type === 'variant';
            const descendantProducts = mockData.getDescendantProducts(node.id);
            
            // Determine tabs based on node type
            let tabs;
            if (isLeafProduct) {
                tabs = ['Overview', 'Details', 'References', 'History'];
            } else {
                tabs = ['Overview', 'Children', 'References', 'Settings'];
            }
            
            const childCount = isLeafProduct ? 0 : children.length;
            
            document.getElementById('contentBody').innerHTML = `
                <div class="content-split">
                    ${renderNodeOverviewPanel(node)}
                    <div class="enrichment-panel">
                        <div class="tabs-container">
                            ${tabs.map((tab, i) => `
                                <div class="tab ${i === state.currentTab ? 'active' : ''}" onclick="switchTab(${i})">
                                    ${tab}${tab === 'Children' ? ` <span class="badge badge-count">${childCount}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                        <div class="tab-content" id="tabContent">
                            ${isLeafProduct ? renderProductTabContent(node, state.currentTab) : renderNodeTabContent(node, state.currentTab)}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNodeOverviewPanel(node) {
            const children = mockData.getChildren(node.id);
            const descendantProducts = mockData.getDescendantProducts(node.id);
            const isLeafProduct = node.type === 'product' || node.type === 'variant';
            const parent = node.parentId ? mockData.getNode(node.parentId) : null;
            
            const typeLabels = {
                'division': 'Division',
                'line': 'Product Line',
                'family': 'Product Family',
                'subfamily': 'Subfamily',
                'product': 'Product',
                'variant': 'Variant'
            };
            
            return `
                <div class="overview-panel">
                    <div class="overview-header">
                        <span class="badge" style="margin-bottom: 8px; background: var(--gray-100);">${typeLabels[node.type] || node.type}</span>
                        <h2 class="overview-title">${node.name}</h2>
                        <p class="overview-subtitle">${node.sku}</p>
                        <div class="overview-status">
                            <span class="status-badge ${getStatusClass(node.status)}">${node.status}</span>
                            ${node.issues > 0 ? `<span class="status-badge status-error">${node.issues} issues</span>` : ''}
                        </div>
                    </div>
                    <div class="overview-section">
                        <h4 class="overview-section-title">Completeness</h4>
                        <div class="completeness-meter">
                            <div class="meter-bar">
                                <div class="meter-fill ${getCompletenessClass(node.completeness)}" style="width: ${node.completeness}%"></div>
                            </div>
                            <div class="meter-label">
                                <span>${node.completeness}% complete</span>
                                <span>${100 - node.completeness}% remaining</span>
                            </div>
                        </div>
                    </div>
                    <div class="overview-section">
                        <h4 class="overview-section-title">Details</h4>
                        ${parent ? `
                            <div class="overview-field">
                                <span class="field-label">Parent</span>
                                <span class="field-value table-link" onclick="navigate('/node/${parent.id}')">${parent.name}</span>
                            </div>
                        ` : ''}
                        <div class="overview-field">
                            <span class="field-label">Last edited</span>
                            <span class="field-value">${formatDate(node.lastEdited)}</span>
                        </div>
                        <div class="overview-field">
                            <span class="field-label">Owner</span>
                            <span class="field-value">${node.owner}</span>
                        </div>
                        ${!isLeafProduct ? `
                            <div class="overview-field">
                                <span class="field-label">Direct Children</span>
                                <span class="field-value">${children.length}</span>
                            </div>
                            <div class="overview-field">
                                <span class="field-label">Total Products</span>
                                <span class="field-value">${descendantProducts.length}</span>
                            </div>
                        ` : `
                            ${node.price ? `
                                <div class="overview-field">
                                    <span class="field-label">Price</span>
                                    <span class="field-value">$${node.price}</span>
                                </div>
                            ` : ''}
                            ${node.brand ? `
                                <div class="overview-field">
                                    <span class="field-label">Brand</span>
                                    <span class="field-value">${node.brand}</span>
                                </div>
                            ` : ''}
                        `}
                    </div>
                    ${isLeafProduct ? `
                        <div class="overview-section">
                            <h4 class="overview-section-title">Quick Links</h4>
                            <div class="chips-container" style="flex-direction: column; gap: 8px;">
                                <span class="chip" onclick="switchTab(2)">${icons.asset} ${node.assetIds?.length || 0} Assets</span>
                                <span class="chip" onclick="switchTab(2)">${icons.supplier} ${node.supplierIds?.length || 0} Suppliers</span>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderNodeTabContent(node, tabIndex) {
            switch(tabIndex) {
                case 0: return renderNodeOverviewTab(node);
                case 1: return renderChildrenTab(node);
                case 2: return renderNodeReferencesTab(node);
                case 3: return renderNodeSettingsTab(node);
                default: return '';
            }
        }

        function renderNodeOverviewTab(node) {
            return `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">${node.type.charAt(0).toUpperCase() + node.type.slice(1)} Details</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label required">Name</label>
                            <input type="text" class="form-input" value="${node.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label required">SKU / Code</label>
                            <input type="text" class="form-input" value="${node.sku}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-input">${node.description || ''}</textarea>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNodeSettingsTab(node) {
            return `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Settings</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">Default Status for New Children</label>
                            <select class="form-input form-select">
                                <option value="draft">Draft</option>
                                <option value="review">Review</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Auto-validation</label>
                            <select class="form-input form-select">
                                <option value="on">Enabled</option>
                                <option value="off">Disabled</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNodeReferencesTab(node) {
            const descendantProducts = mockData.getDescendantProducts(node.id);
            const assetIds = new Set();
            const supplierIds = new Set();
            
            descendantProducts.forEach(p => {
                p.assetIds?.forEach(id => assetIds.add(id));
                p.supplierIds?.forEach(id => supplierIds.add(id));
            });
            
            const assets = mockData.assets.filter(a => assetIds.has(a.id));
            const suppliers = mockData.suppliers.filter(s => supplierIds.has(s.id));
            
            const refTypes = [
                { key: 'assets', label: 'Assets', count: assets.length, icon: icons.asset },
                { key: 'suppliers', label: 'Suppliers', count: suppliers.length, icon: icons.supplier }
            ];
            
            return `
                <div class="card">
                    <div class="ref-type-tabs">
                        ${refTypes.map(type => `
                            <div class="ref-type-tab ${state.referenceType === type.key ? 'active' : ''}" onclick="setReferenceType('${type.key}')">
                                ${type.icon} ${type.label} <span class="count">${type.count}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="table-actions">
                        <div class="search-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            <input type="text" class="search-input" placeholder="Search ${state.referenceType}...">
                        </div>
                        <div class="table-actions-right">
                            <div class="view-switcher">
                                <button class="view-btn ${state.viewMode === 'table' ? 'active' : ''}" onclick="setViewMode('table')">
                                    ${icons.table}
                                </button>
                                <button class="view-btn ${state.viewMode === 'gallery' ? 'active' : ''}" onclick="setViewMode('gallery')">
                                    ${icons.grid}
                                </button>
                            </div>
                        </div>
                    </div>
                    ${state.referenceType === 'assets' ? renderAssetsContent(assets) : renderSuppliersContent(suppliers)}
                </div>
            `;
        }

        // Legacy function alias
        function renderFamilyTabContent(family, tabIndex) {
            return renderNodeTabContent(family, tabIndex);
        }

        function renderFamilyOverviewTab(family) {
            return `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Family Details</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label required">Name</label>
                            <input type="text" class="form-input" value="${family.name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label required">SKU</label>
                            <input type="text" class="form-input" value="${family.sku}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-input">${family.description}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Attribute Set</label>
                            <select class="form-input form-select">
                                <option>${family.attributeSet}</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettingsTab(family) {
            return `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Family Settings</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">Default Status for New Products</label>
                            <select class="form-input form-select">
                                <option value="draft">Draft</option>
                                <option value="review">Review</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Auto-validation</label>
                            <select class="form-input form-select">
                                <option value="on">Enabled</option>
                                <option value="off">Disabled</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // PRODUCTS TABLE WITH FILTERING/SORTING/PAGINATION
        // ============================================
        function getFilteredChildren(nodeId) {
            // Get direct children of a node
            let children = mockData.getChildren(nodeId);
            
            // Apply search filter
            if (state.filters.search) {
                const search = state.filters.search.toLowerCase();
                children = children.filter(c => 
                    c.name.toLowerCase().includes(search) ||
                    c.sku.toLowerCase().includes(search) ||
                    (c.brand && c.brand.toLowerCase().includes(search))
                );
            }
            
            // Apply status filter
            if (state.filters.status) {
                children = children.filter(c => c.status === state.filters.status);
            }
            
            // Apply completeness filter
            if (state.filters.completeness) {
                if (state.filters.completeness === 'complete') {
                    children = children.filter(c => c.completeness >= 80);
                } else if (state.filters.completeness === 'incomplete') {
                    children = children.filter(c => c.completeness < 80);
                } else if (state.filters.completeness === 'issues') {
                    children = children.filter(c => c.issues > 0);
                }
            }
            
            // Apply sorting
            products.sort((a, b) => {
                let aVal = a[state.sort.column];
                let bVal = b[state.sort.column];
                
                if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                
                if (aVal < bVal) return state.sort.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return state.sort.direction === 'asc' ? 1 : -1;
                return 0;
            });
            
            return products;
        }

        function renderChildrenTab(node) {
            const allChildren = getFilteredChildren(node.id);
            const totalCount = allChildren.length;
            const { page, pageSize } = state.pagination;
            const totalPages = Math.ceil(totalCount / pageSize);
            const startIdx = (page - 1) * pageSize;
            const children = allChildren.slice(startIdx, startIdx + pageSize);
            
            const hasSelection = state.selectedRows.size > 0;
            
            return `
                <div class="card">
                    ${hasSelection ? renderBulkActionsBar() : ''}
                    ${renderChildrenTableActions(node, totalCount)}
                    ${renderActiveFilters()}
                    <div class="table-container" style="max-height: calc(100vh - 400px); overflow: auto;">
                        ${state.viewMode === 'table' ? renderChildrenTable(children) : ''}
                        ${state.viewMode === 'gallery' ? renderChildrenGallery(children) : ''}
                        ${state.viewMode === 'list' ? renderChildrenList(children) : ''}
                    </div>
                    ${renderPagination(totalCount, totalPages)}
                </div>
            `;
        }

        function renderBulkActionsBar() {
            return `
                <div class="bulk-actions">
                    <span class="bulk-actions-count">${state.selectedRows.size} selected</span>
                    <button class="btn btn-sm" onclick="openBulkEditModal()">
                        ${icons.edit} Bulk Edit
                    </button>
                    <button class="btn btn-sm" onclick="bulkUpdateStatus('review')">
                        Set to Review
                    </button>
                    <button class="btn btn-sm" onclick="bulkUpdateStatus('published')">
                        ${icons.publish} Publish
                    </button>
                    <button class="btn btn-sm" onclick="showToast('Exported ${state.selectedRows.size} products', 'success')">
                        ${icons.download} Export
                    </button>
                    <button class="bulk-actions-close" onclick="clearSelection()">
                        ${icons.close}
                    </button>
                </div>
            `;
        }

        function renderChildrenTableActions(node, totalCount) {
            const childType = getChildTypeName(node.type);
            return `
                <div class="table-actions">
                    <div class="table-actions-left">
                        <button class="btn btn-primary btn-sm">+ Add ${childType}</button>
                        <div class="search-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            <input type="text" class="search-input" placeholder="Search..." 
                                value="${state.filters.search}" 
                                oninput="handleTableSearch(this.value)">
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="toggleFilterPanel()">
                            ${icons.filter} Filter ${state.filters.status || state.filters.completeness ? `<span class="badge badge-count" style="margin-left: 4px;">!</span>` : ''}
                        </button>
                    </div>
                    <div class="table-actions-right">
                        <span style="color: var(--gray-500); font-size: 12px;">${totalCount} items</span>
                        <div class="view-switcher">
                            <button class="view-btn ${state.viewMode === 'table' ? 'active' : ''}" onclick="setViewMode('table')" title="Table View">
                                ${icons.table}
                            </button>
                            <button class="view-btn ${state.viewMode === 'gallery' ? 'active' : ''}" onclick="setViewMode('gallery')" title="Gallery View">
                                ${icons.grid}
                            </button>
                            <button class="view-btn ${state.viewMode === 'list' ? 'active' : ''}" onclick="setViewMode('list')" title="List View">
                                ${icons.list}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActiveFilters() {
            const filters = [];
            if (state.filters.status) filters.push({ key: 'status', label: `Status: ${state.filters.status}` });
            if (state.filters.completeness) filters.push({ key: 'completeness', label: `Completeness: ${state.filters.completeness}` });
            
            if (filters.length === 0) return '';
            
            return `
                <div class="active-filters">
                    ${filters.map(f => `
                        <span class="active-filter">
                            ${f.label}
                            <button onclick="clearFilter('${f.key}')">${icons.close}</button>
                        </span>
                    `).join('')}
                    <button class="btn btn-ghost btn-sm" onclick="clearAllFilters()">Clear all</button>
                </div>
            `;
        }

        function getChildTypeName(parentType) {
            const typeMap = {
                'division': 'Product Line',
                'line': 'Family',
                'family': 'Subfamily',
                'subfamily': 'Product',
                'product': 'Variant'
            };
            return typeMap[parentType] || 'Item';
        }

        function renderChildrenTable(children) {
            if (children.length === 0) {
                return renderEmptyState('No items found', 'Try adjusting your search or filters');
            }
            
            const columns = [
                { key: 'select', label: '', sortable: false },
                { key: 'name', label: 'Name', sortable: true },
                { key: 'type', label: 'Type', sortable: true },
                { key: 'sku', label: 'SKU', sortable: true },
                { key: 'status', label: 'Status', sortable: true },
                { key: 'completeness', label: 'Completeness', sortable: true },
                { key: 'issues', label: 'Issues', sortable: true },
                { key: 'lastEdited', label: 'Last Modified', sortable: true }
            ];
            
            return `
                <table class="data-table">
                    <thead>
                        <tr>
                            ${columns.map(col => {
                                if (col.key === 'select') {
                                    return `<th style="width: 40px;"><input type="checkbox" class="table-checkbox" onclick="toggleAllRows(this)" ${state.selectedRows.size === children.length && children.length > 0 ? 'checked' : ''}></th>`;
                                }
                                const isSorted = state.sort.column === col.key;
                                return `
                                    <th class="${isSorted ? 'sorted' : ''} ${isSorted && state.sort.direction === 'desc' ? 'sorted-desc' : ''}"
                                        onclick="${col.sortable ? `sortTable('${col.key}')` : ''}">
                                        ${col.label}
                                        ${col.sortable ? `<span class="sort-icon">${icons.arrowUp}</span>` : ''}
                                    </th>
                                `;
                            }).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${children.map(child => `
                            <tr class="${state.selectedRows.has(child.id) ? 'selected' : ''}">
                                <td><input type="checkbox" class="table-checkbox" data-id="${child.id}" onclick="toggleRow('${child.id}')" ${state.selectedRows.has(child.id) ? 'checked' : ''}></td>
                                <td><span class="table-link" onclick="navigate('/node/${child.id}')">${child.name}</span></td>
                                <td><span class="badge" style="text-transform: capitalize;">${child.type}</span></td>
                                <td><span class="status-badge ${getStatusClass(child.status)}">${child.status}</span></td>
                                <td>
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <div class="meter-bar" style="width: 60px;">
                                            <div class="meter-fill ${getCompletenessClass(child.completeness)}" style="width: ${child.completeness}%"></div>
                                        </div>
                                        <span>${child.completeness}%</span>
                                    </div>
                                </td>
                                <td>${child.issues > 0 ? `<span class="badge badge-issues">${child.issues}</span>` : `<span class="validation-icon valid">${icons.check}</span>`}</td>
                                <td>${formatDate(child.lastEdited)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderChildrenGallery(children) {
            if (children.length === 0) {
                return renderEmptyState('No items found', 'Try adjusting your search or filters');
            }
            
            return `
                <div class="gallery-grid">
                    ${children.map(child => {
                        const mainAsset = child.assetIds ? mockData.assets.find(a => a.id === child.assetIds[0]) : null;
                        return `
                            <div class="gallery-card ${state.selectedRows.has(child.id) ? 'selected' : ''}" onclick="navigate('/node/${child.id}')">
                                <input type="checkbox" class="table-checkbox gallery-card-checkbox" data-id="${child.id}" 
                                    onclick="event.stopPropagation(); toggleRow('${child.id}')" 
                                    ${state.selectedRows.has(child.id) ? 'checked' : ''}>
                                <div class="gallery-card-preview">
                                    ${mainAsset?.thumbnail 
                                        ? `<img src="${mainAsset.thumbnail}" alt="${child.name}">`
                                        : getNodeIcon(child.type)
                                    }
                                </div>
                                <div class="gallery-card-info">
                                    <div class="gallery-card-name">${child.name}</div>
                                    <div class="gallery-card-meta">
                                        <span class="status-badge ${getStatusClass(child.status)}" style="font-size: 10px; padding: 2px 6px;">${child.status}</span>
                                        <span>${child.completeness}%</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderChildrenList(children) {
            if (children.length === 0) {
                return renderEmptyState('No items found', 'Try adjusting your search or filters');
            }
            
            return `
                <div class="list-view">
                    ${children.map(child => `
                        <div class="list-item ${state.selectedRows.has(child.id) ? 'selected' : ''}" onclick="navigate('/node/${child.id}')">
                            <input type="checkbox" class="table-checkbox" data-id="${child.id}" 
                                onclick="event.stopPropagation(); toggleRow('${child.id}')" 
                                ${state.selectedRows.has(child.id) ? 'checked' : ''}>
                            <div class="list-item-icon">${getNodeIcon(child.type)}</div>
                            <div class="list-item-content">
                                <div class="list-item-title">${child.name}</div>
                                <div class="list-item-subtitle">${child.sku} • ${child.type}${child.price ? ` • $${child.price}` : ''}</div>
                            </div>
                            <div class="list-item-badges">
                                <span class="status-badge ${getStatusClass(child.status)}">${child.status}</span>
                                <span class="badge badge-completeness ${getCompletenessClass(child.completeness)}">${child.completeness}%</span>
                                ${child.issues > 0 ? `<span class="badge badge-issues">${child.issues}</span>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderPagination(totalCount, totalPages) {
            const { page, pageSize } = state.pagination;
            const startItem = (page - 1) * pageSize + 1;
            const endItem = Math.min(page * pageSize, totalCount);
            
            return `
                <div class="pagination">
                    <div class="pagination-info">
                        Showing ${startItem}-${endItem} of ${totalCount}
                    </div>
                    <div class="pagination-controls">
                        <select class="page-size-select" onchange="setPageSize(this.value)">
                            <option value="25" ${pageSize === 25 ? 'selected' : ''}>25 per page</option>
                            <option value="50" ${pageSize === 50 ? 'selected' : ''}>50 per page</option>
                            <option value="100" ${pageSize === 100 ? 'selected' : ''}>100 per page</option>
                        </select>
                        <button class="pagination-btn" onclick="goToPage(1)" ${page === 1 ? 'disabled' : ''}>First</button>
                        <button class="pagination-btn" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>Prev</button>
                        <span style="font-size: 13px; color: var(--gray-600);">Page ${page} of ${totalPages}</span>
                        <button class="pagination-btn" onclick="goToPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>Next</button>
                        <button class="pagination-btn" onclick="goToPage(${totalPages})" ${page >= totalPages ? 'disabled' : ''}>Last</button>
                    </div>
                </div>
            `;
        }

        function renderEmptyState(title, text) {
            return `
                <div class="empty-state">
                    ${icons.search}
                    <div class="empty-state-title">${title}</div>
                    <div class="empty-state-text">${text}</div>
                </div>
            `;
        }

        // Table interaction handlers
        function handleTableSearch(value) {
            state.filters.search = value;
            state.pagination.page = 1;
            renderTabContent();
        }

        function setFilter(key, value) {
            state.filters[key] = value;
            state.pagination.page = 1;
            renderTabContent();
        }

        function clearFilter(key) {
            state.filters[key] = null;
            state.pagination.page = 1;
            renderTabContent();
        }

        function clearAllFilters() {
            state.filters = { status: null, completeness: null, search: '' };
            state.pagination.page = 1;
            renderTabContent();
        }

        function sortTable(column) {
            if (state.sort.column === column) {
                state.sort.direction = state.sort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                state.sort.column = column;
                state.sort.direction = 'asc';
            }
            renderTabContent();
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            renderTabContent();
        }

        function goToPage(page) {
            state.pagination.page = page;
            renderTabContent();
        }

        function setPageSize(size) {
            state.pagination.pageSize = parseInt(size);
            state.pagination.page = 1;
            renderTabContent();
        }

        function toggleRow(id) {
            if (state.selectedRows.has(id)) {
                state.selectedRows.delete(id);
            } else {
                state.selectedRows.add(id);
            }
            renderTabContent();
        }

        function toggleAllRows(checkbox) {
            const children = getFilteredChildren(state.currentEntity.id);
            const { page, pageSize } = state.pagination;
            const pageChildren = children.slice((page - 1) * pageSize, page * pageSize);
            
            if (checkbox.checked) {

            } else {
                pageChildren.forEach(c => state.selectedRows.delete(c.id));
            }
            renderTabContent();

        function closeBulkEditModal() {
            document.getElementById('bulkEditModal').classList.remove('open');
        }

        function applyBulkEdit() {
            const status = document.getElementById('bulkStatus').value;
            const owner = document.getElementById('bulkOwner').value;
            const brand = document.getElementById('bulkBrand').value;
            
            let changes = [];
            state.selectedRows.forEach(id => {
                const product = mockData.products.find(p => p.id === id);
                if (product) {
                    if (status) { product.status = status; changes.push('status'); }
                    if (owner) { product.owner = owner; changes.push('owner'); }
                    if (brand) { product.brand = brand; changes.push('brand'); }
                }
            });
            
            closeBulkEditModal();
            showToast(`Updated ${state.selectedRows.size} products`, 'success');
            state.selectedRows.clear();
            renderTabContent();
        }

        function bulkUpdateStatus(status) {
            state.selectedRows.forEach(id => {
                const product = mockData.products.find(p => p.id === id);
                if (product) {
                    product.status = status;
                    if (status === 'published') {
                        product.completeness = Math.max(product.completeness, 85);
                        product.issues = 0;
                    }
                }
            });
            
            showToast(`Set ${state.selectedRows.size} products to ${status}`, 'success');
            state.selectedRows.clear();
            renderTabContent();
        }
