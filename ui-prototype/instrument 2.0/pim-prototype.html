                                </div>
                            </div>
                        ` : ''}
                        
                        ${results.products.length > 0 ? `
                            <div class="card" style="margin-bottom: 16px;">
                                <div class="card-header">
                                    <h3 class="card-title">${icons.product} Products (${results.products.length}${results.products.length === 50 ? '+' : ''})</h3>
                                </div>
                                <div class="table-container" style="max-height: 400px; overflow: auto;">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Name</th>
                                                <th>SKU</th>
                                                <th>Brand</th>
                                                <th>Status</th>
                                                <th>Completeness</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${results.products.map(p => `
                                                <tr>
                                                    <td><span class="table-link" onclick="navigate('/node/${p.id}')">${p.name}</span></td>
                                                    <td>${p.sku}</td>
                                                    <td>${p.brand}</td>
                                                    <td><span class="status-badge ${getStatusClass(p.status)}">${p.status}</span></td>
                                                    <td>${p.completeness}%</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ` : ''}
                        
                        ${results.assets.length > 0 ? `
                            <div class="card" style="margin-bottom: 16px;">
                                <div class="card-header">
                                    <h3 class="card-title">${icons.asset} Assets (${results.assets.length})</h3>
                                </div>
                                <div class="gallery-grid" style="padding: 16px;">
                                    ${results.assets.map(a => `
                                        <div class="gallery-card" onclick="navigate('/assets/${a.id}')">
                                            <div class="gallery-card-preview">
                                                ${a.thumbnail ? `<img src="${a.thumbnail}" alt="${a.name}">` : icons.asset}
                                            </div>
                                            <div class="gallery-card-info">
                                                <div class="gallery-card-name">${a.name}</div>
                                                <div class="gallery-card-meta">${a.format} • ${a.size}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${results.suppliers.length > 0 ? `
                            <div class="card">
                                <div class="card-header">
                                    <h3 class="card-title">${icons.supplier} Suppliers (${results.suppliers.length})</h3>
                                </div>
                                <div class="list-view">
                                    ${results.suppliers.map(s => `
                                        <div class="list-item" onclick="openDrawer('supplier', '${s.id}')">
                                            <div class="list-item-icon">${icons.supplier}</div>
                                            <div class="list-item-content">
                                                <div class="list-item-title">${s.name}</div>
                                                <div class="list-item-subtitle">${s.code} • ${s.country}</div>
                                            </div>
                                            <span class="status-badge ${s.status === 'active' ? 'status-published' : 'status-draft'}">${s.status}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${totalResults === 0 ? `
                            <div class="empty-state">
                                ${icons.search}
                                <div class="empty-state-title">No results found</div>
                                <div class="empty-state-text">Try adjusting your search terms</div>
                            </div>
                        ` : ''}
                    `}
                </div>
            `;
        }

        let searchTimeout;
        function debounceSearch(value) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                navigate(`/search/${encodeURIComponent(value)}`, true);
            }, 300);
        }

        // ============================================
        // DRAWER
        // ============================================
        function openDrawer(type, id) {
            const entity = getEntity(type, id);
            if (!entity) return;
            
            document.getElementById('drawerTitle').textContent = entity.name;
            document.getElementById('drawerOverlay').classList.add('open');
            document.getElementById('drawer').classList.add('open');
            
            let content = '';
            
            if (type === 'asset') {
                content = `
                    <div style="background: var(--gray-100); border-radius: 8px; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; overflow: hidden;">
                        ${entity.thumbnail 
                            ? `<img src="${entity.thumbnail}" alt="${entity.name}" style="width: 100%; height: 100%; object-fit: cover;">`
                            : `<div style="color: var(--gray-400);">${icons.asset}</div>`
                        }
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Type</span>
                        <span class="field-value">${entity.type}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Format</span>
                        <span class="field-value">${entity.format}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Size</span>
                        <span class="field-value">${entity.size}</span>
                    </div>
                    ${entity.dimensions ? `
                        <div class="overview-field" style="margin-bottom: 12px;">
                            <span class="field-label">Dimensions</span>
                            <span class="field-value">${entity.dimensions}</span>
                        </div>
                    ` : ''}
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Used by</span>
                        <span class="field-value">${entity.usedBy.length} product(s)</span>
                    </div>
                `;
                document.getElementById('drawerOpenFull').onclick = () => { closeDrawer(); navigate(`/assets/${id}`); };
            } else if (type === 'supplier') {
                content = `
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Code</span>
                        <span class="field-value">${entity.code}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Country</span>
                        <span class="field-value">${entity.country}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Rating</span>
                        <span class="field-value">${entity.rating} ${icons.star}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Lead Time</span>
                        <span class="field-value">${entity.leadTime}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Status</span>
                        <span class="status-badge ${entity.status === 'active' ? 'status-published' : 'status-draft'}">${entity.status}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Contact</span>
                        <span class="field-value">${entity.email}</span>
                    </div>
                `;
                document.getElementById('drawerOpenFull').style.display = 'none';
            } else if (type === 'product') {
                const family = getEntity('family', entity.familyId);
                content = `
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">SKU</span>
                        <span class="field-value">${entity.sku}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Status</span>
                        <span class="status-badge ${getStatusClass(entity.status)}">${entity.status}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Family</span>
                        <span class="field-value">${family?.name || 'N/A'}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Price</span>
                        <span class="field-value">$${entity.price}</span>
                    </div>
                    <div class="overview-field" style="margin-bottom: 12px;">
                        <span class="field-label">Completeness</span>
                        <span class="field-value">${entity.completeness}%</span>
                    </div>
                    <p style="margin-top: 16px; font-size: 13px; color: var(--gray-600);">${entity.description}</p>
                `;
                document.getElementById('drawerOpenFull').onclick = () => { closeDrawer(); navigate(`/products/${id}`); };
                document.getElementById('drawerOpenFull').style.display = 'flex';
            }
            
            document.getElementById('drawerBody').innerHTML = content;
        }

        function closeDrawer() {
            document.getElementById('drawerOverlay').classList.remove('open');
            document.getElementById('drawer').classList.remove('open');
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            // Handle hash-based routing
            const handleRoute = () => {
                const hash = window.location.hash.slice(1) || '/families/fam-001';
                state.currentRoute = hash;
                renderPage();
                updateSidebarActive();
            };
            
            window.addEventListener('hashchange', handleRoute);
            
            // Initial render
            renderSidebar();
            handleRoute();
            updateBackButton();
            
            // Close dropdowns when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.dropdown')) {
                    document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('open'));
                }
            });
        }

        // Start the application
        init();
    </script>
</body>
</html>
