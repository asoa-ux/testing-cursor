<!DOCTYPE html>
<html>
<head>
    <title>Hello World! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            color: white;
            text-shadow: 4px 4px 0px #ff6b6b, 8px 8px 0px #feca57;
            animation: bounce 0.5s ease infinite alternate, rainbow 3s linear infinite;
        }

        @keyframes bounce {
            from { transform: translateY(0) rotate(-2deg); }
            to { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .emoji-rain {
            position: fixed;
            font-size: 2rem;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            margin-top: 20px;
            animation: wiggle 0.3s ease infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .party-button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Comic Sans MS', cursive;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #ee5a5a;
            transition: all 0.1s;
        }

        .party-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #ee5a5a;
        }

        .party-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #ee5a5a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p class="subtitle">✨ Welcome to the silliest page ever! ✨</p>
        <button class="party-button" onclick="partyMode()">🎉 MORE PARTY! 🎉</button>
    </div>

    <script>
        const emojis = ['🎉', '🎊', '🥳', '🎈', '⭐', '💫', '🌟', '🎪', '🦄', '🌈', '🍕', '🎸', '🚀', '👻', '🤪'];
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
        }

        function createEmojiRain() {
            const emoji = document.createElement('div');
            emoji.className = 'emoji-rain';
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.top = '-50px';
            emoji.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 5000);
        }

        // Start the party!
        setInterval(createConfetti, 100);
        setInterval(createEmojiRain, 300);

        function partyMode() {
            // Extra confetti burst!
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    createConfetti();
                    createEmojiRain();
                }, i * 20);
            }
            
            // Screen shake
            document.body.style.animation = 'none';
            document.body.offsetHeight;
            document.body.style.animation = 'shake 0.5s ease';
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px) rotate(-1deg); }
                75% { transform: translateX(10px) rotate(1deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
